<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Nightmare - Proximamente</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      overflow: hidden;
    }

    .coming-soon {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .coming-soon__panel {
      width: min(760px, 100%);
      padding: 40px 36px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        radial-gradient(circle at top, rgba(218, 114, 62, 0.18), transparent 36%),
        linear-gradient(180deg, rgba(34, 18, 14, 0.96), rgba(17, 14, 18, 0.98));
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
      color: #e8d8c9;
      text-align: center;
    }

    .coming-soon__eyebrow {
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 12px;
      color: #d99e63;
    }

    .coming-soon__title {
      font-size: clamp(42px, 9vw, 82px);
      line-height: 0.95;
      color: #f0c78d;
      margin-bottom: 16px;
    }

    .coming-soon__subtitle {
      font-size: clamp(20px, 4vw, 30px);
      margin-bottom: 18px;
      color: #f4e4d4;
    }

    .coming-soon__text {
      max-width: 560px;
      margin: 0 auto 28px;
      line-height: 1.65;
      color: rgba(232, 216, 201, 0.9);
    }

    .coming-soon__actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .coming-soon__actions .button {
      min-width: 220px;
    }

    .coming-soon__secondary {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #f3e3d2;
      box-shadow: none;
    }
  </style>
</head>

<body>
  <main class="coming-soon">
    <section class="coming-soon__panel">
      <p class="coming-soon__eyebrow">Demo publica</p>
      <h1 class="coming-soon__title">PROXIMAMENTE</h1>
      <p class="coming-soon__subtitle">El Area del Algebra llegara en una siguiente version.</p>
      <p class="coming-soon__text">
        Ya desbloqueaste el camino, pero en esta publicacion solo esta disponible el area de
        Aritmetica. Puedes volver al inicio o seguir explorando lo que ya esta abierto en la demo.
      </p>
      <div class="coming-soon__actions">
        <a class="button" href="index.html">Volver al inicio</a>
        <a class="button coming-soon__secondary" href="index.html">Seguir en Aritmetica</a>
      </div>
    </section>
  </main>
</body>

</html>
